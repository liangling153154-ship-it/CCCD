<script>
  // DÁN ĐƯỜNG LINK GOOGLE APPS SCRIPT CỦA BẠN VÀO ĐÂY
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzW5SfriqLXKG9vGLHW-0EyCzVD_B3OXimJT_4-6b-C-QN-lbqJOdl0qiCkQ4ZPVt8_FA/exec';

  let scanner = null;
  let scanned = false;
  let cameras = [];
  let currentCamIdx = 0;

  // Thuật toán: Tìm mắt camera chính xác nhất
  function findMainCameraIndex(devices) {
    if (!devices || devices.length <= 1) return 0;

    let bestIdx = 0;
    for (let i = 0; i < devices.length; i++) {
      let lbl = devices[i].label.toLowerCase();
      
      // Bỏ qua camera trước
      if (lbl.includes('front') || lbl.includes('trước')) continue;
      
      // Bỏ qua góc rộng và chụp xa
      if (lbl.includes('ultra') || lbl.includes('wide') || lbl.includes('rộng') || lbl.includes('tele')) continue;

      // Nếu tên camera có chữ 'back', 'sau' hoặc số '0' (mặc định Android) -> Lấy luôn
      if (lbl.includes('back') || lbl.includes('sau') || lbl.includes('0')) {
        return i;
      }
      bestIdx = i; // Lưu lại phương án dự phòng
    }
    
    // MẸO DÀNH CHO IPHONE: Nếu thuật toán đọc tên thất bại, iPhone thường xếp mắt chính 1x ở vị trí cuối cùng trong danh sách
    return devices.length - 1;
  }

  function startScan() {
    const room = document.getElementById('room').value.trim();
    if (!room) { alert('Vui lòng nhập số phòng trước!'); return; }

    scanned = false;
    document.querySelector('.btn-scan').style.display = 'none';
    document.getElementById('actionButtons').style.display = 'flex';
    showStatus('⏳ Đang phân tích các ống kính...', 'loading');

    if (!scanner) {
      scanner = new Html5Qrcode("reader");
    }

    // Quét tìm tất cả các mắt camera
    Html5Qrcode.getCameras().then(devices => {
      if (devices && devices.length > 0) {
        cameras = devices;
        // Chạy thuật toán tìm mắt chính
        currentCamIdx = findMainCameraIndex(cameras);
        startWithCamera(cameras[currentCamIdx].id);
      } else {
        startWithCamera({ facingMode: "environment" });
      }
    }).catch(err => {
      startWithCamera({ facingMode: "environment" });
    });
  }

  function startWithCamera(cameraIdOrConfig) {
    scanner.start(
      cameraIdOrConfig,
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onScanSuccess,
      () => {}
    ).then(() => {
      showStatus('📷 Đưa QR vào khung hình... <br><small><i>(Vẫn bị mờ? Bấm "Đổi Ống Kính")</i></small>', 'loading');
    }).catch(err => {
      showStatus('❌ Lỗi mở ống kính: ' + err, 'error');
    });
  }

  function switchCamera() {
    if (cameras.length > 1) {
      currentCamIdx = (currentCamIdx + 1) % cameras.length;
      showStatus('⏳ Đang chuyển ống kính...', 'loading');
      scanner.stop().then(() => {
        startWithCamera(cameras[currentCamIdx].id);
      });
    } else {
      alert('Điện thoại của bạn chỉ có 1 ống kính hỗ trợ quét!');
    }
  }

  function stopScan() {
    if (scanner) {
      scanner.stop().then(() => {
        scanner.clear();
        scanner = null;
      });
    }
    document.querySelector('.btn-scan').style.display = 'block';
    document.getElementById('actionButtons').style.display = 'none';
  }

  function onScanSuccess(text) {
    if (scanned) return;
    scanned = true;
    stopScan();

    const parts = text.split('|');
    if (parts.length < 7) {
      showStatus('❌ QR không hợp lệ. Vui lòng quét lại CCCD.', 'error');
      return;
    }

    const room = document.getElementById('room').value.trim();
    showStatus(`
      ✅ <b>Đọc CCCD thành công!</b><br>
      👤 Họ tên: <b>${parts[2]}</b><br>
      🪪 CCCD: ${parts[0]}<br>
      🏠 Địa chỉ: ${parts[5]}<br>
      🛏️ Phòng: ${room}<br>
      <i>⏳ Đang đẩy dữ liệu lên máy chủ...</i>
    `, 'loading');

    fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ qrData: text, room: room })
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        showStatus(`
          ✅ <b>Đã lưu thành công!</b><br>
          👤 ${data.name} — Phòng ${room}<br>
          <small>Tiếp tục nhập số phòng để quét khách tiếp theo</small>
        `, 'success');
        document.getElementById('room').value = '';
      } else {
        showStatus('❌ Lỗi máy chủ: ' + data.error, 'error');
      }
    })
    .catch(err => showStatus('❌ Lỗi kết nối mạng, vui lòng thử lại.', 'error'));
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.style.display = 'block';
    el.className = type;
    el.innerHTML = msg;
  }
</script>
